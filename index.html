<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
    <title>FlatBuffers Binary Visualizer</title>
    <style>
        html, body {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background: #1a1a2e;
        }
        canvas {
            width: 100% !important;
            height: 100% !important;
        }
        #loading {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            color: #e0e0e0;
            font-family: monospace;
            font-size: 18px;
            text-align: center;
        }
        .spinner {
            width: 40px;
            height: 40px;
            margin: 20px auto;
            border: 4px solid #333;
            border-top: 4px solid #6495ed;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
    </style>
<link rel="modulepreload" href="./flatbuf-visualizer-c6192c8812ff28f1.js" crossorigin="anonymous" integrity="sha384-wOX9cjEqLsUQ8pA5pvutLejV0KX9fTVxq7/7bORXEwapCFWcXZMbGkr6Y4/dRlAb"><link rel="preload" href="./flatbuf-visualizer-c6192c8812ff28f1_bg.wasm" crossorigin="anonymous" integrity="sha384-r0zwfQOiAeov8sITfMx8g2Rjy8R+nTQUzkuKY5ABVp7ovIQEiKwlhPb3CtqdNhAb" as="fetch" type="application/wasm"></head>
<body>
    <div id="loading">
        <div class="spinner"></div>
        Loading FlatBuffers Visualizer...
    </div>
    <canvas id="the_canvas_id"></canvas>
    <script>
        document.addEventListener("DOMContentLoaded", function() {
            // Hide loading indicator once WASM is ready
            var canvas = document.getElementById("the_canvas_id");
            var observer = new MutationObserver(function() {
                document.getElementById("loading").style.display = "none";
            });
            observer.observe(canvas, { attributes: true });

            // Re-enable browser right-click context menu (eframe blocks it by default).
            // Use capture phase to intercept before eframe's handler.
            canvas.addEventListener("contextmenu", function(e) {
                e.stopImmediatePropagation();
            }, true);
        });
    </script>

<script type="module">
import init, * as bindings from './flatbuf-visualizer-c6192c8812ff28f1.js';
const wasm = await init({ module_or_path: './flatbuf-visualizer-c6192c8812ff28f1_bg.wasm' });


window.wasmBindings = bindings;


dispatchEvent(new CustomEvent("TrunkApplicationStarted", {detail: {wasm}}));

</script></body>
</html>
