<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
    <title>FlatBuffers Binary Visualizer</title>
    <style>
        html, body {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background: #1a1a2e;
        }
        canvas {
            width: 100% !important;
            height: 100% !important;
        }
        #loading {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            color: #e0e0e0;
            font-family: monospace;
            font-size: 18px;
            text-align: center;
        }
        .spinner {
            width: 40px;
            height: 40px;
            margin: 20px auto;
            border: 4px solid #333;
            border-top: 4px solid #6495ed;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
    </style>
<link rel="modulepreload" href="./flatbuf-visualizer.js" crossorigin="anonymous" integrity="sha384-O1GEWLjDepJNfKU8d5CisoZP5jOgS69V93V5sAeldNozPEgs01o8JAybd72dVP7Q"><link rel="preload" href="./flatbuf-visualizer_bg.wasm" crossorigin="anonymous" integrity="sha384-UfGHybSJRObv8te7vN11uzJwgSEpRnGZRAQs83uHbyUNmqYbbXWaxCke0tvjM9xr" as="fetch" type="application/wasm"></head>
<body>
    <div id="loading">
        <div class="spinner"></div>
        Loading FlatBuffers Visualizer...
    </div>
    <canvas id="the_canvas_id"></canvas>
    <script>
        document.addEventListener("DOMContentLoaded", function() {
            // Hide loading indicator once WASM is ready
            var canvas = document.getElementById("the_canvas_id");
            var observer = new MutationObserver(function() {
                document.getElementById("loading").style.display = "none";
            });
            observer.observe(canvas, { attributes: true });
        });
    </script>

<script type="module">
import init, * as bindings from './flatbuf-visualizer.js';
const wasm = await init({ module_or_path: './flatbuf-visualizer_bg.wasm' });


window.wasmBindings = bindings;


dispatchEvent(new CustomEvent("TrunkApplicationStarted", {detail: {wasm}}));

</script></body>
</html>
